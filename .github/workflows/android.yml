name: Build Android APK

on:
  push:
    branches: [ "main" ] # تأكد أن اسم الفرع عندك main وليس master
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # تم التحديث إلى v4

      - name: Set up Python
        uses: actions/setup-python@v5 # تم التحديث إلى v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev
          sudo apt-get install -y autoconf libtool pkg-config
          pip3 install --user --upgrade Cython==0.29.33 buildozer

      - name: Build with Buildozer
        run: |
          # قبول التراخيص وبدء البناء
          yes | buildozer -v android debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4 # تم التحديث إلى v4 (هذا هو حل الخطأ الظاهر في الصورة)
        with:
          name: package
          path: bin/*.apk
